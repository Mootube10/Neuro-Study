<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuroStudy Flashcards</title>
<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background-color: #f4f4f4;
  text-align: center;
}
header {
  background-color: #6b5b53;
  color: white;
  padding: 15px;
}
.container {
  padding: 20px;
}
button {
  padding: 10px 20px;
  margin: 10px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}
.card {
  background: white;
  padding: 30px;
  margin: 20px auto;
  width: 300px;
  border-radius: 12px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}
.hidden { display: none; }
</style>
</head>
<body>

<header>
  <h1>NeuroStudy</h1>
  <p>Flashcard Revision</p>
</header>

<div class="container" id="menu">
  <h2>Choose a subject</h2>
  <button onclick="start('maths')">Maths</button>
  <button onclick="start('english')">English</button>
  <button onclick="start('science')">Science</button>
</div>

<div class="container hidden" id="game">
  <div class="card">
    <h3 id="question">Question</h3>
    <input type="text" id="answer" placeholder="Type your answer">
    <br><br>
    <button onclick="checkAnswer()">Submit</button>
    <p id="feedback"></p>
    <button onclick="nextQuestion()">Next</button>
  </div>
</div>

<script>
let questions = {
  maths: [
    {q: "What is 5 + 3?", a: "8", explain: "5 + 3 = 8"},
    {q: "Solve x: x + 4 = 10", a: "6", explain: "Subtract 4 from 10"}
  ],
  english: [
    {q: "What is a simile?", a: "comparison", explain: "A simile compares using like or as"}
  ],
  science: [
    {q: "What is a cell?", a: "basic unit of life", explain: "Cells are the smallest unit of life"}
  ]
};

let currentSubject = "";
let currentIndex = 0;

function start(subject) {
  currentSubject = subject;
  currentIndex = 0;
  document.getElementById('menu').classList.add('hidden');
  document.getElementById('game').classList.remove('hidden');
  loadQuestion();
}

function loadQuestion() {
  let q = questions[currentSubject][currentIndex];
  document.getElementById('question').innerText = q.q;
  document.getElementById('answer').value = "";
  document.getElementById('feedback').innerText = "";
}

function checkAnswer() {
  let userAnswer = document.getElementById('answer').value.toLowerCase();
  let correct = questions[currentSubject][currentIndex].a.toLowerCase();
  let explain = questions[currentSubject][currentIndex].explain;

  if(userAnswer === correct) {
    document.getElementById('feedback').innerText = "Correct ✅";
  } else {
    document.getElementById('feedback').innerText = "Incorrect ❌ | " + explain;
  }
}

function nextQuestion() {
  currentIndex++;
  if(currentIndex >= questions[currentSubject].length) {
    alert("Finished!");
    location.reload();
  } else {
    loadQuestion();
  }
}
</script>

</body>
</html>
